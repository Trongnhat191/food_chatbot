version: "3.1"
nlu:
- intent: greet
  examples: |
    - chào bạn
    - hello
    - xin chào
- intent: search_recipe
  examples: |
    - Cách nấu [phở bò](dish)
    - Hướng dẫn làm [canh mồng tơi](dish)
    - Tìm công thức [sườn xào](dish)
- intent: next_step
  examples: |
    - xong rồi
    - bước tiếp theo đi
    - làm gì nữa không
    - tiếp tục
- intent: prev_step
  examples: |
    - quay lại bước trước
    - cho xem lại bước vừa nãy
    - bước trước đó là gì
- intent: set_preference
  examples: |
    - Tôi không ăn được [cay](preference)
    - Đừng cho [hành](preference) nhé
    - Mình bị dị ứng [hải sản](preference)
- intent: ask_suggestion
  examples: |
    - Gợi ý món [gà](ingredient)
    - Có món gì ngon từ [thịt lợn](ingredient) không?
- intent: suggest_by_ingredients
  examples: |
    - tôi có [thịt lợn](ingredient) và [bí xanh](ingredient) nấu gì ngon?
    - còn [trứng](ingredient) thì làm món gì được?
    - gợi ý món ăn với [đậu phụ](ingredient)

- intent: show_full_recipe
  examples: |
    - hiện hết đi
    - cho xem cả bài
    - xem toàn bộ các bước món [rau muống](dish)
    - show hết cách làm [sườn xào](dish)
    - cho xem tất cả các bước