version: "3.1"

stories:

- story: Luồng từ gợi ý nguyên liệu đến nấu từng bước (Happy Path)
  steps:
  - intent: greet
  - action: utter_greet
  - intent: suggest_by_ingredients
    entities:
    - ingredient: "đậu phụ"
    - ingredient: "nấm"
  - action: action_recipe_search  
  - intent: search_recipe        
    entities:
    - dish: "canh đậu phụ nấu nấm"
  - action: action_recipe_search  
  - intent: next_step
  - action: action_next_step
  - intent: next_step
  - action: action_next_step

- story: Gợi ý nguyên liệu và xem toàn bộ công thức luôn
  steps:
  - intent: suggest_by_ingredients
  - action: action_recipe_search
  - intent: search_recipe
  - action: action_recipe_search
  - intent: show_full_recipe      
  - action: action_show_full_recipe

- story: Tìm món trực tiếp và xem toàn bộ công thức
  steps:
  - intent: search_recipe
  - action: action_recipe_search
  - intent: show_full_recipe
  - action: action_show_full_recipe

- story: Đang nấu món này nhưng muốn đổi sang món khác (Context Switch)
  steps:
  - intent: search_recipe
  - action: action_recipe_search
  - intent: next_step
  - action: action_next_step
  - intent: search_recipe          
  - action: action_recipe_search  
  - action: action_next_step

- story: Người dùng gõ "tiếp" khi chưa chọn món (Xử lý lỗi)
  steps:
  - intent: next_step
  - action: action_next_step       